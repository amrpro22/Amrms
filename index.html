<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع قانون صندوق محبران</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        .law-item {
            transition: all 0.3s ease;
            border-right: 4px solid transparent;
        }

        .law-item.active {
            background-color: #f0f9ff;
            border-right-color: #2563eb;
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #2563eb;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
    </style>
</head>
<body class="py-8 px-4">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    <!-- Header -->
    <div class="sticky-header border-b border-gray-100 p-6 text-center">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-900">قانون صندوق مساعدة الحالات المرضية</h1>
        <p class="text-blue-600 font-medium mt-1">قرية محبران - ميثاق الالتزام والتكافل</p>
        
        <div class="mt-4 bg-blue-50 rounded-full h-2 w-full max-w-md mx-auto overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
        </div>
        <p id="progressText" class="text-xs text-gray-500 mt-2">يرجى الموافقة على جميع البنود (0/20)</p>
    </div>

    <!-- Law Sections Container -->
    <div class="p-6 md:p-10 space-y-4 max-h-[60vh] overflow-y-auto" id="lawContainer">
        <!-- يتم ملء البنود هنا بواسطة الجافا سكريبت -->
    </div>

    <!-- Final Signing Section -->
    <div class="p-6 md:p-10 bg-gray-50 border-t border-gray-100">
        <div class="max-w-md mx-auto space-y-4">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700">الاسم الكامل (التوقيع الإلكتروني):</label>
                <input type="text" id="fullName" placeholder="اكتب اسمك الثلاثي للموافقة..." 
                    class="w-full px-5 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-600 focus:ring-0 outline-none transition-all text-lg text-center">
            </div>
            
            <button id="submitBtn" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg cursor-not-allowed transition-all flex items-center justify-center gap-3">
                <span id="btnLabel">أكمل الموافقة على البنود</span>
                <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
            
            <div class="text-center pt-2">
                <p class="text-[12px] text-gray-500 font-bold">تطوير عمرو مسعد الشجاع . اشراف مصطفى الشجاع</p>
            </div>
            <p id="errorMsg" class="text-red-500 text-xs text-center font-medium hidden"></p>
        </div>
    </div>

    <!-- Table of Signed Users -->
    <div class="p-6 bg-white border-t border-gray-100">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
            قائمة الموقعين على القانون (سحابياً)
        </h3>
        <div class="overflow-x-auto rounded-xl border border-gray-100">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 text-gray-600 font-bold">
                    <tr>
                        <th class="px-4 py-3">الاسم</th>
                        <th class="px-4 py-3">تاريخ التوقيع</th>
                        <th class="px-4 py-3">الحالة</th>
                    </tr>
                </thead>
                <tbody id="signaturesTableBody" class="divide-y divide-gray-50">
                    <tr>
                        <td colspan="3" class="px-4 py-8 text-center text-gray-400 italic">جاري تحميل قائمة الموقعين...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // البنود القانونية كما وردت
    const lawData = [
        { t: "1. مبدأ التكافل والمشاركة المجتمعية", c: "يقوم الصندوق على مبدأ التكافل الاجتماعي والتعاون بين أبناء القرية، وعلى جميع أبناء القرية المقتدرين المشاركة والمساهمة فيه..." },
        { t: "2. تنظيم التبرعات وتوثيقها ومنع التبرع المباشر", c: "جميع التبرعات والمساهمات المالية الخاصة بالحالات المرضية أو الطارئة يجب أن تدخل عبر الصندوق فقط، وتوثق رسميًا وبشكل واضح..." },
        { t: "3. نطاق تغطية الصندوق وحدود مسؤوليته", c: "يقتصر دعم الصندوق على تكاليف العلاج، والفحوصات، والعمليات، والأدوية الأساسية، والرقود بالمستشفى فقط..." },
        { t: "4. انتهاء مسؤولية الصندوق بعد الوفاة", c: "تنتهي مسؤولية الصندوق فور وفاة الحالة بشكل كامل ونهائي، ولا يتحمل أي مصاريف لاحقة تتعلق بالدفن أو العزاء..." },
        { t: "5. تنظيم الحالات البسيطة", c: "الحالات التي تقل تكلفتها عن 200 ألف ريال يمني، إذا كانت الأسرة قادرة ومقتدرة ماليًا، لا يشملها دعم الصندوق." },
        { t: "6. التحقق الصارم من الحالات قبل الدعم", c: "لا يتم اعتماد أي حالة أو صرف أي مبلغ إلا بعد التحقق الكامل والدقيق من صحة الحالة واحتياجها الفعلي." },
        { t: "7. القيادة التنفيذية والصلاحيات المخولة", c: "يتولى إدارة الصندوق والإشراف المباشر: مصطفى الشجاع، أحمد بن أحمد الشجاع، نبيل الشجاع، ومحمد بن محمد الشجاع." },
        { t: "8. نظام دعم الحالات الطارئة وضوابط الصرف", c: "يختص الصندوق بدعم الحالات المرضية الطارئة والحوادث العرضية وفق نظام مالي منظم وضوابط صارمة تحفظ أموال الصندوق." },
        { t: "9. الشورى والتصويت", c: "جميع القرارات المصيرية أو الحالات الكبيرة أو التعديلات الجوهرية تعتمد بالشورى والتصويت، ويكون قرار الأغلبية ملزمًا للجميع." },
        { t: "10. سرية المجموعة وحماية خصوصية العمل", c: "يُمنع منعًا باتًا إخراج أي أسرار من المجموعة، سواء كانت قرارات، تصويتات، أو حالات مرضية. أي إخلال يعتبر خيانة للأمانة." },
        { t: "11. منع الشقاق وإثارة الفتن", c: "يُمنع منعًا باتًا نقل الأخبار أو إثارة الخلافات أو شق الصف أو نشر النعرات أو خلق الانقسامات داخل الصندوق أو اللجنة." },
        { t: "12. أخلاقيات وسلوك أعضاء اللجنة التشاورية", c: "يلتزم الأعضاء بالعقل والحكمة والأخلاق والهدوء وضبط النفس بعيدًا عن العصبية والغوغاء." },
        { t: "13. الالتزام بالحضور والتفاعل الإداري", c: "التغيب عن ثلاثة تصويتات متتالية يؤدي لمنح مهلة 30 يومًا قبل إمكانية استبدال العضو بشخص أكثر كفاءة." },
        { t: "14. الإعفاء من العضوية والعقوبات التنظيمية", c: "يحق للإدارة إعفاء أي عضو يثبت عليه الإهمال أو التقصير أو كثرة الجدل الفارغ أو الإضرار بمصلحة الصندوق." },
        { t: "15. الحرمان الكامل من الدعم", c: "أي شخص يطلب دعمًا ثم يتلقى دعمًا من الخارج أو ينشر حالته سراً لجمع التبرعات دون علم الإدارة يحرم من الدعم." },
        { t: "16. أولوية الدعم وربط الحق بالواجب", c: "الأولوية للحالات الأشد خطراً، ويعتبر الالتزام بالمساهمة شرطاً أساسياً للاستفادة من الصندوق." },
        { t: "17. الشافافية المالية وسجل المشاركين", c: "أموال الصندوق أمانة جماعية، وقد تم وضع رابط رسمي يظهر فيه جميع المشاركين ومبالغ مساهماتهم." },
        { t: "18. التزام أعضاء الإدارة واللجنة بالمساهمة", c: "يلتزم جميع أعضاء الإدارة واللجنة بإنزال مساهماتهم كقدوة أولى في الالتزام وتحمل المسؤولية." },
        { t: "19. احترام القرار الجماعي", c: "بعد اتخاذ القرار واعتماده، يلتزم الجميع باحترامه والعمل به وعدم إثارة الخلاف حوله." },
        { t: "20. المصلحة العامة فوق المصالح الشخصية", c: "كل عمل أو قرار داخل الصندوق يجب أن يكون قائمًا على مصلحة الصندوق والقرية فوق أي مصلحة شخصية." }
    ];

    // الإعدادات
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mahbran-signature-v3';

    // ملء البنود
    const lawContainer = document.getElementById('lawContainer');
    lawData.forEach((item) => {
        const div = document.createElement('div');
        div.className = "law-item p-4 rounded-xl border border-gray-100 bg-gray-50/50 flex gap-4";
        div.innerHTML = `
            <input type="checkbox" class="item-check custom-checkbox mt-1 shrink-0">
            <div>
                <h3 class="font-bold text-gray-800 mb-1 text-sm md:text-base">${item.t}</h3>
                <p class="text-xs md:text-sm text-gray-500 leading-relaxed">${item.c}</p>
            </div>
        `;
        lawContainer.appendChild(div);
    });

    const checks = document.querySelectorAll('.item-check');
    const submitBtn = document.getElementById('submitBtn');
    const btnLabel = document.getElementById('btnLabel');
    const fullNameInput = document.getElementById('fullName');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const signaturesTableBody = document.getElementById('signaturesTableBody');

    // وظيفة التحقق لتفعيل الزر
    function validate() {
        const checkedCount = Array.from(checks).filter(c => c.checked).length;
        const total = checks.length;
        const name = fullNameInput.value.trim();
        
        // تحديث شريط التقدم
        const percent = (checkedCount / total) * 100;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `تمت الموافقة على (${checkedCount}/${total}) بنداً`;

        // تفعيل الزر إذا اكتملت الشروط
        if (checkedCount === total && name.length >= 8) {
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            submitBtn.classList.remove('cursor-not-allowed');
            btnLabel.textContent = "أرسل التوقيع والالتزام الآن";
        } else {
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            submitBtn.classList.add('cursor-not-allowed');
            
            if (checkedCount < total) {
                btnLabel.textContent = "يرجى الموافقة على جميع البنود";
            } else {
                btnLabel.textContent = "يرجى كتابة الاسم الثلاثي كاملاً";
            }
        }
    }

    // ربط الأحداث
    checks.forEach(check => {
        check.addEventListener('change', () => {
            check.closest('.law-item').classList.toggle('active', check.checked);
            validate();
        });
    });
    fullNameInput.addEventListener('input', validate);

    // التشغيل الأولي للبيانات والاشتراك في التحديثات
    const startDataSync = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) { console.error("Auth Error", e); }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // جلب قائمة الموقعين وعرضها
                const sigCol = collection(db, 'artifacts', appId, 'public', 'data', 'verified_signatures');
                onSnapshot(sigCol, (snapshot) => {
                    signaturesTableBody.innerHTML = '';
                    const docs = snapshot.docs
                        .map(d => d.data())
                        .sort((a, b) => (b.signedAt?.seconds || 0) - (a.signedAt?.seconds || 0));

                    if (docs.length === 0) {
                        signaturesTableBody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-400">لا يوجد موقعون حتى الآن</td></tr>';
                        return;
                    }

                    docs.forEach(data => {
                        const date = data.signedAt ? new Date(data.signedAt.seconds * 1000).toLocaleDateString('ar-EG') : 'جاري المعالجة';
                        const row = `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-3 font-medium text-gray-800">${data.name}</td>
                                <td class="px-4 py-3 text-gray-500">${date}</td>
                                <td class="px-4 py-3 text-green-600 font-bold text-xs md:text-sm">✓ تم التوقيع</td>
                            </tr>
                        `;
                        signaturesTableBody.insertAdjacentHTML('beforeend', row);
                    });
                });
            }
        });
    };

    startDataSync();

    // إرسال التوقيع
    submitBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) return;

        const nameValue = fullNameInput.value.trim();
        submitBtn.disabled = true;
        document.getElementById('btnLoader').classList.remove('hidden');
        btnLabel.textContent = "جاري الحفظ...";

        try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'verified_signatures'), {
                name: nameValue,
                uid: user.uid,
                signedAt: serverTimestamp(),
                version: '3.1'
            });

            // إعادة تعيين الحقول
            fullNameInput.value = '';
            checks.forEach(c => { c.checked = false; c.closest('.law-item').classList.remove('active'); });
            validate();
            document.getElementById('btnLoader').classList.add('hidden');
            
            // تنبيه نجاح بسيط
            alert("تم توثيق توقيعك بنجاح في قاعدة البيانات.");
        } catch (e) {
            console.error(e);
            submitBtn.disabled = false;
            document.getElementById('btnLoader').classList.add('hidden');
            validate();
        }
    });
</script>

</body>
</html>
